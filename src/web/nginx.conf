server {
    # Unprivileged nginx image listens on 8080 (non-root cannot bind :80).
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: fall back to index.html so client-side state survives deep links.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
